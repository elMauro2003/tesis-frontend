openapi: 3.0.3
info:
  title: API Sistema de Gestión de Residencias Estudiantiles — UCLV
  version: 1.0.0
  description: Backend del sistema de gestión de residencias estudiantiles de la Universidad
    Central 'Marta Abreu' de Las Villas (UCLV). Implementado con Django REST Framework
    como parte del Trabajo de Diploma de Mauricio Jesús Avalo Tamayo.
paths:
  /api/v1/alas/:
    get:
      operationId: alas_list
      summary: Listar alas (RF-36)
      parameters:
      - in: query
        name: building
        schema:
          type: integer
      - in: query
        name: building__site
        schema:
          type: integer
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - infrastructure
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedWingList'
          description: ''
    post:
      operationId: alas_create
      summary: Crear ala (RF-35)
      tags:
      - infrastructure
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WingRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/WingRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/WingRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Wing'
          description: ''
  /api/v1/alas/{id}/:
    get:
      operationId: alas_retrieve
      summary: Detalle de ala (RF-37)
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Ala.
        required: true
      tags:
      - infrastructure
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Wing'
          description: ''
    patch:
      operationId: alas_partial_update
      summary: Actualizar ala (RF-38)
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Ala.
        required: true
      tags:
      - infrastructure
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedWingRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedWingRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedWingRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Wing'
          description: ''
    delete:
      operationId: alas_destroy
      summary: Eliminar ala (RF-39)
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Ala.
        required: true
      tags:
      - infrastructure
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/anios-academicos/:
    get:
      operationId: anios_academicos_list
      summary: Listar años académicos
      parameters:
      - in: query
        name: career
        schema:
          type: integer
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: year
        schema:
          type: integer
          title: Año
          enum:
          - 1
          - 2
          - 3
          - 4
          - 5
        description: |-
          * `1` - 1° Año
          * `2` - 2° Año
          * `3` - 3° Año
          * `4` - 4° Año
          * `5` - 5° Año
      tags:
      - academic
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCareerYearList'
          description: ''
    post:
      operationId: anios_academicos_create
      summary: Crear año académico
      tags:
      - academic
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CareerYearRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CareerYearRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CareerYearRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CareerYear'
          description: ''
  /api/v1/anios-academicos/{id}/:
    get:
      operationId: anios_academicos_retrieve
      summary: Detalle de año académico
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Año Académico.
        required: true
      tags:
      - academic
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CareerYear'
          description: ''
    put:
      operationId: anios_academicos_update
      summary: Actualizar año académico
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Año Académico.
        required: true
      tags:
      - academic
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CareerYearRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CareerYearRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CareerYearRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CareerYear'
          description: ''
    patch:
      operationId: anios_academicos_partial_update
      summary: Actualizar año académico (parcial)
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Año Académico.
        required: true
      tags:
      - academic
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedCareerYearRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedCareerYearRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedCareerYearRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CareerYear'
          description: ''
    delete:
      operationId: anios_academicos_destroy
      summary: Eliminar año académico
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Año Académico.
        required: true
      tags:
      - academic
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/asignaciones/:
    get:
      operationId: asignaciones_list
      summary: Histórico de asignaciones (RF-47)
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
