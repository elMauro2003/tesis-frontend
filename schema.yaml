          type: string
          readOnly: true
        student_id_code:
          type: string
          readOnly: true
        room:
          type: integer
          title: Cuarto
        room_detail:
          type: string
          readOnly: true
        assigned_date:
          type: string
          format: date
          title: Fecha de asignación
        released_date:
          type: string
          format: date
          readOnly: true
          nullable: true
          title: Fecha de liberación
          description: NULL indica que la asignación está activa
        is_active:
          type: boolean
          readOnly: true
        assigned_by:
          type: integer
          readOnly: true
          title: Asignado por
        assigned_by_name:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
