      responses:
        '200':
          description: Contraseña actualizada
        '400':
          description: Datos inválidos
  /api/v1/auth/login/:
    post:
      operationId: auth_login_create
      description: Autentica al usuario y devuelve un par de tokens JWT. El access
        token expira en 15 minutos; el refresh token en 7 días. El payload del access
        token incluye los roles del usuario.
      summary: Login — Obtener tokens JWT
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomTokenObtainPairRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CustomTokenObtainPairRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CustomTokenObtainPairRequest'
        required: true
      security:
      - {}
      responses:
        '200':
          description: No response body
  /api/v1/auth/logout/:
    post:
      operationId: auth_logout_create
      description: El backend no invalida tokens (arquitectura stateless). El cliente
        debe descartar el access y refresh token localmente. Devuelve 200 OK como
        confirmación.
      summary: Logout (client-side)
      tags:
      - auth
      security:
      - jwtAuth: []
      responses:
        '200':
          description: Logout exitoso
  /api/v1/auth/me/:
    get:
      operationId: auth_me_retrieve
      summary: Perfil del usuario autenticado
      tags:
      - auth
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
  /api/v1/auth/refresh/:
    post:
      operationId: auth_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      summary: Refrescar access token
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
